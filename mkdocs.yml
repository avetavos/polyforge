site_name: Polyforge Documentation
site_description: Architecture, infrastructure, database, API, and business-logic docs for the Polyforge polyglot microservices monorepo.
repo_url: https://github.com/avetavos/polyforge
repo_name: avetavos/polyforge
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search

nav:
  - Home: index.md
  - Architecture: architecture/index.md
  - Infrastructure: infrastructure/index.md
  - Services:
      - Overview: services/index.md
      - Order Service: services/order-service.md
      - Inventory Service: services/inventory-service.md
      - Catalog Service: services/catalog-service.md
      - Recommendation Service: services/recommendation-service.md
  - Database Schemas: database/index.md
  - API Reference: api/index.md
  - Business Logic: business-logic/index.md
  - Contributing: contributing.md
